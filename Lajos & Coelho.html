<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lajos & Coelho — Sistema de Identidade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal: #58C3B5;
      --sky: #8BD5F0;
      --green: #55F28C;
      --ink: #2B2B2E;
      --bg: #F7FAFA;
      --line: #E6ECEC;
      --muted: #6B7375;
      --glass: rgba(255,255,255,0.6);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
      -webkit-font-smoothing: antialiased;
    }
    /* Smooth scroll & subtle interactions */
    html { scroll-behavior: smooth; }

    /* === Card primitives === */
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      transition: transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s, border-color .3s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px -12px rgba(43, 43, 46, 0.12), 0 2px 6px rgba(43,43,46,.04);
      border-color: #d8e0e0;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      letter-spacing: .04em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 500;
    }
    .card-head .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 8px;
      background: var(--bg);
      border-radius: 6px;
      color: var(--ink);
      text-transform: none;
      letter-spacing: 0;
    }
    .card-body {
      padding: 40px;
      display: grid;
      place-items: center;
      min-height: 0;
    }
    .stage {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    /* === Lockup typography ===
       The wordmark is set in Inter — modern, sans-serif, premium. */
    .wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }
    .wordmark .amp {
      font-weight: 300;
      color: var(--teal);
      margin: 0 .08em;
    }
    .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* === Section header === */
    .sec-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      margin: 0 0 4px;
    }
    .sec-sub {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
      max-width: 60ch;
    }

    /* === Animated entrance === */
    @keyframes reveal-in {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }
    .reveal {
      animation: reveal-in .8s cubic-bezier(.2,.8,.2,1) both;
    }

    /* === Floating glow under primary lockup === */
    .glow-base {
      position: relative;
    }
    .glow-base::before {
      content: '';
      position: absolute;
      inset: 10% 15%;
      background: radial-gradient(closest-side, rgba(88,195,181,.35), transparent 70%);
      filter: blur(40px);
      z-index: 0;
      opacity: .8;
      animation: floatGlow 6s ease-in-out infinite;
    }
    .glow-base > * { position: relative; z-index: 1; }
    @keyframes floatGlow {
      0%,100% { transform: translate3d(0,0,0) scale(1); opacity: .75; }
      50%     { transform: translate3d(8px,-6px,0) scale(1.06); opacity: 1; }
    }

    /* === Construction grid === */
    .grid-bg {
      background-image:
        linear-gradient(to right, rgba(43,43,46,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(43,43,46,.06) 1px, transparent 1px);
      background-size: 12.5% 12.5%;
    }

    /* Dark card */
    .dark {
      background: linear-gradient(160deg, #0E1416 0%, #1A2225 100%);
      color: #fff;
    }
    .dark .card-head {
      border-bottom-color: rgba(255,255,255,.08);
      color: rgba(255,255,255,.55);
    }
    .dark .card-head .tag {
      background: rgba(255,255,255,.06);
      color: #fff;
    }
    .dark .wordmark { color: #fff; }
    .dark .wordmark .amp { color: var(--sky); }
    .dark .tagline { color: rgba(255,255,255,.55); }

    /* Favicon-style */
    .squircle {
      width: 88px; height: 88px;
      background: #fff;
      border-radius: 22px;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 30px -8px rgba(43,43,46,.12), inset 0 0 0 1px rgba(43,43,46,.05);
    }
    .squircle.dark {
      background: var(--ink);
      box-shadow: 0 10px 30px -8px rgba(43,43,46,.4);
    }
    .squircle.gradient {
      background: linear-gradient(135deg, #58C3B5 0%, #8BD5F0 100%);
      box-shadow: 0 12px 30px -6px rgba(88,195,181,.45);
    }

    /* Browser chrome */
    .chrome {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px -10px rgba(43,43,46,.12);
    }
    .chrome-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: #FAFCFC;
      border-bottom: 1px solid var(--line);
    }
    .chrome-bar .dot { width: 11px; height: 11px; border-radius: 50%; background: #E6ECEC; }
    .chrome-bar .url {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .chrome-tab {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
    }
    .chrome-content {
      padding: 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px;
    }
    .nav-pills {
      display: flex; gap: 18px;
      font-size: 12px; color: var(--muted);
    }
    .nav-pills .active { color: var(--ink); font-weight: 500; }

    /* Phone */
    .phone {
      width: 220px; height: 440px;
      background: #fff;
      border-radius: 32px;
      border: 1px solid var(--line);
      box-shadow: 0 30px 60px -20px rgba(43,43,46,.18), inset 0 0 0 6px #fff, 0 0 0 8px #1a1a1c;
      padding: 42px 18px 24px;
      position: relative;
      overflow: hidden;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 14px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 22px;
      background: #1a1a1c;
      border-radius: 12px;
    }

    /* Pulse used for accent dots */
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%     { transform: scale(1.3); opacity: .55; }
    }

    /* Spec lines */
    .spec {
      position: absolute;
      background: var(--teal);
      opacity: .55;
    }
    .spec-label {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--teal);
      background: #fff;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid rgba(88,195,181,.3);
    }

    /* Color swatch */
    .swatch {
      border-radius: 14px;
      padding: 18px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      transition: transform .4s cubic-bezier(.2,.8,.2,1);
    }
    .swatch:hover { transform: translateY(-4px); }
    .swatch .name {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* Marquee for "system" feel */
    .ticker {
      display: flex; gap: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      animation: tick 30s linear infinite;
      white-space: nowrap;
    }
    @keyframes tick { from { transform: translateX(0);} to {transform: translateX(-50%);} }

    .build-step {
      transition: opacity .6s, transform .6s cubic-bezier(.2,.8,.2,1);
    }

    /* Hover-spin for the mark in the hero */
    .hero-mark {
      transition: transform 1s cubic-bezier(.2,.8,.2,1);
    }
    .hero-mark:hover { transform: rotate(-4deg) scale(1.04); }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

        <linearGradient id="t" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#58C3B5"/><stop offset="1" stop-color="#8BD5F0"/>
        </linearGradient>
      </defs>
      <rect width="100" height="100" fill="#F7FAFA"/>
      <g transform="translate(28 28) scale(.69)">
        <path d="M 14 4 L 60 4 L 60 18 L 28 18 Q 18 18 18 28 L 18 60 L 4 60 L 4 14 Q 4 4 14 4 Z" fill="url(#t)"/>
        <path d="M 60 60 L 24 60 L 24 46 L 46 46 L 46 24 L 60 24 Z" fill="url(#t)" opacity=".55"/>
        <circle cx="53" cy="11" r="3.2" fill="#55F28C"/>
      </g>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>
